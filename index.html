<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burmese Subtitle Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Myanmar+Text&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --radius: 8px;
            --transition: all 0.2s;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Myanmar Text', 'Padauk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
a { text-decoration: none; color: inherit; }
        
        /* Navigation */
        .main-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        
        .nav-brand i { font-size: 24px; }
        
        .nav-links { display: flex; gap: 4px; }
        
        .nav-link {
            padding: 8px 16px;
            color: var(--text-muted);
            border-radius: var(--radius);
            transition: var(--transition);
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--text-primary);
            background: var(--bg-card);
        }
        
        .nav-actions { display: flex; gap: 4px; }
        
        .btn-icon {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius);
            color: var(--text-muted);
            transition: var(--transition);
        }
        
        .btn-icon:hover { 
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        /* Mobile Nav Toggle */
        .mobile-nav-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }
        
        .mobile-nav-toggle span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            transition: var(--transition);
        }
        
        /* Mobile Menu */
        .mobile-menu {
            display: none;
            position: fixed;
            top: 57px;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px;
            flex-direction: column;
            gap: 4px;
            z-index: 99;
        }
        
        .mobile-menu.show { display: flex; }
        
        .mobile-menu .nav-link { padding: 12px 16px; }
        
        @media (max-width: 768px) {
            .nav-links, .nav-actions { display: none; }
            .mobile-nav-toggle { display: flex; }
            .mobile-menu.show { display: flex; }
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-size: 18px; font-weight: bold; }
        .header-actions { display: flex; gap: 8px; }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
        }
        
        /* App Container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Upload Bar */
        .upload-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .upload-bar button {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Video Section */
        .video-section {
            position: relative;
        }
        .video-container {
            position: relative;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            max-height: 60vh;
        }
        #video-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Subtitle Overlay */
        .subtitle-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            pointer-events: none;
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        .subtitle-overlay .subtitle-text {
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 22px;
            line-height: 1.5;
            display: inline-block;
        }
        
        /* Video Controls - Inside */
        .video-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            border-radius: var(--radius);
            z-index: 10;
        }
        .video-controls .progress-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .video-controls .time-display {
            font-size: 12px;
            color: #fff;
            min-width: 80px;
        }
        .video-controls .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .video-controls .progress-played {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
        }
        .video-controls .buttons-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .video-controls .control-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: var(--radius);
            color: #fff;
        }
        .video-controls .control-btn:hover { background: rgba(255,255,255,0.2); }
        .video-controls .volume-slider { width: 70px; }
        .video-controls .speed-selector {
            padding: 4px 8px;
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: none;
            border-radius: var(--radius);
        }
        
        /* Video Placeholder */
        .video-placeholder {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            color: var(--text-muted);
        }
        .video-placeholder.hidden { display: none; }
        
        /* Editor Section */
        .editor-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .editor-panel {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .editor-header h2 { font-size: 16px; }
        .editor-buttons { display: flex; gap: 8px; }
        
        /* Subtitle Input */
        .subtitle-input-area { display: flex; flex-direction: column; gap: 12px; }
        .time-row { display: flex; gap: 12px; }
        .time-field { flex: 1; }
        .time-field label { display: block; font-size: 12px; margin-bottom: 4px; color: var(--text-muted); }
        .time-field input {
            width: 100%;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: monospace;
        }
        .subtitle-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            resize: vertical;
            font-family: inherit;
        }
        
        /* Subtitle List */
        .subtitle-list {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .subtitle-item {
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
        }
        .subtitle-item:hover { background: var(--bg-primary); }
        .subtitle-item.active { border-left: 3px solid var(--primary); }
        .subtitle-item .time {
            font-size: 12px;
            color: var(--text-muted);
            font-family: monospace;
        }
        .subtitle-item .text { margin-top: 4px; }
        
        /* Device Frame Toggle */
        .device-frame-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: var(--radius);
            z-index: 1000;
        }
        .device-frame-toggle button {
            padding: 8px 16px;
            border: none;
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--radius);
        }
        .device-frame-toggle button.active {
            background: var(--primary);
            color: white;
        }
        
        /* Device Frames */
        body.device-mobile .app-container { max-width: 480px; }
        body.device-mobile .editor-section { grid-template-columns: 1fr; }
        body.device-mobile .video-container { aspect-ratio: 9/16; max-height: 70vh; }
        
        body.device-tablet .app-container { max-width: 768px; }
        body.device-tablet .video-container { max-height: 50vh; }
        
        body.device-desktop .app-container { max-width: 1400px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .editor-section { grid-template-columns: 1fr; }
            .upload-bar { flex-direction: column; }
            .upload-bar button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- Main Navigation -->
    <nav class="main-nav">
        <div class="nav-content">
            <a href="index.html" class="nav-brand">
                <i class="bi bi-film"></i>
                <span>Burme Transcript</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html" class="nav-link active"><i class="bi bi-pencil-square"></i> Editor</a>
                <a href="translate.html" class="nav-link"><i class="bi bi-translate"></i> Translate</a>
                <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
                <a href="docs.html" class="nav-link"><i class="bi bi-book"></i> Docs</a>
                <a href="about.html" class="nav-link"><i class="bi bi-info-circle"></i> About</a>
            </div>
            
            <div class="nav-actions">
                <button class="btn-icon" id="theme-toggle" title="Toggle Theme"><i class="bi bi-moon"></i></button>
                <button class="btn-icon" id="logout-btn" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
            </div>

            <button class="mobile-nav-toggle" id="mobile-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" class="nav-link active"><i class="bi bi-pencil-square"></i> Editor</a>
        <a href="translate.html" class="nav-link"><i class="bi bi-translate"></i> Translate</a>
        <a href="dashboard.html" class="nav-link"><i class="bi bi-grid"></i> Dashboard</a>
        <a href="docs.html" class="nav-link"><i class="bi bi-book"></i> Docs</a>
        <a href="about.html" class="nav-link"><i class="bi bi-info-circle"></i> About</a>
    </div>

    <main class="app-container">
        <!-- Upload Bar -->
        <div class="upload-bar">
            <button class="btn-primary" onclick="document.getElementById('video-input').click()">
                <i class="bi bi-film"></i> Upload Movie
            </button>
            <input type="file" id="video-input" accept="video/*" hidden>
            <button class="btn-secondary" onclick="document.getElementById('subtitle-input').click()">
                <i class="bi bi-file-text"></i> Upload SRT
            </button>
            <input type="file" id="subtitle-input" accept=".srt" hidden>
        </div>

        <!-- Video Section -->
        <section class="video-section">
            <div class="video-container">
                <video id="video-player" playsinline>
                    Your browser does not support HTML5 video.
                </video>
                <div class="subtitle-overlay" id="subtitle-overlay">
                    <span class="subtitle-text"></span>
                </div>
                <div class="video-placeholder" id="video-placeholder">
                    <i class="bi bi-film" style="font-size: 48px;"></i>
                    <p>No video loaded</p>
                </div>
                <div class="video-controls" id="video-controls">
                    <div class="progress-row">
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-played" id="progress-played"></div>
                        </div>
                    </div>
                    <div class="buttons-row">
                        <button class="control-btn" id="play-pause-btn">▶</button>
                        <button class="control-btn" id="stop-btn">⏹</button>
                        <button class="control-btn" id="rewind-btn">-10s</button>
                        <button class="control-btn" id="forward-btn">+10s</button>
                        <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.1" value="1">
                        <select class="speed-selector" id="speed-selector">
                            <option value="0.5">0.5x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Editor Section -->
        <section class="editor-section">
            <div class="editor-panel">
                <div class="editor-header">
                    <h2>Edit Subtitle</h2>
                    <div class="editor-buttons">
                        <button class="btn-secondary" id="sync-btn">Sync</button>
                        <button class="btn-secondary" id="add-subtitle-btn">+ Add</button>
                    </div>
                </div>
                <div class="subtitle-input-area">
                    <div class="time-row">
                        <div class="time-field">
                            <label>Start</label>
                            <input type="text" id="start-time" class="timecode" placeholder="00:00:00,000">
                        </div>
                        <div class="time-field">
                            <label>End</label>
                            <input type="text" id="end-time" class="timecode" placeholder="00:00:00,000">
                        </div>
                    </div>
                    <textarea id="subtitle-text-input" class="subtitle-textarea" placeholder="Enter subtitle text..."></textarea>
                    <button class="btn-primary" id="save-subtitle-btn">Save</button>
                </div>
            </div>
            <div class="subtitle-list" id="subtitle-list">
                <div class="subtitle-item">
                    <div class="time">00:00:00,000 --> 00:00:00,000</div>
                    <div class="text">No subtitles loaded</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Device Frame Toggle -->
    <div class="device-frame-toggle">
        <button onclick="toggleDeviceFrame('desktop')" class="active" id="btn-desktop">Desktop</button>
        <button onclick="toggleDeviceFrame('tablet')" id="btn-tablet">Tablet</button>
        <button onclick="toggleDeviceFrame('mobile')" id="btn-mobile">Mobile</button>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
        // Firebase config - same as login page
        const firebaseConfig = {
            apiKey: "AIzaSyD7u74n-PU7uFqU5eBNdI1cJ7vS6E5WqZQ",
            authDomain: "amk-apk.firebaseapp.com",
            databaseURL: "https://amk-apk-default-rtdb.firebaseio.com",
            projectId: "amk-apk",
            storageBucket: "amk-apk.firebasestorage.app",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123def456"
        };
        window.firebaseConfig = firebaseConfig;
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Check auth immediately
        const auth = firebase.auth();
        auth.onAuthStateChanged(function(user) {
            if (!user) {
                window.location.href = 'login.html';
            }
        });
    </script>
    <script src="js/firebase-auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
    <script src="js/srt-parser.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Mobile menu toggle
        document.getElementById('mobile-toggle').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('show');
        });
        
        // Logout button
        document.getElementById('logout-btn').addEventListener('click', function() {
            if(confirm('Logout?')) {
                window.location.href = 'login.html';
            }
        });
        
        function toggleDeviceFrame(device) {
            document.body.className = '';
            document.body.classList.add('device-' + device);
            document.querySelectorAll('.device-frame-toggle button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + device).classList.add('active');
        }
    </script>
</body>
</html>
